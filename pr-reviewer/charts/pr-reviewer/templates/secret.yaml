apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pr-reviewer.fullname" . }}-secret
  labels:
    {{- include "pr-reviewer.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.github.token }}
  github-token: {{ .Values.github.token | b64enc }}
  {{- end }}
  {{- if .Values.github.appPrivateKey }}
  github-app-private-key: {{ .Values.github.appPrivateKey | b64enc }}
  {{- end }}
  {{- if .Values.github.webhookSecret }}
  github-webhook-secret: {{ .Values.github.webhookSecret | b64enc }}
  {{- end }}
