# =====================================================================
# AI Code Review — Reusable Workflow
# =====================================================================
# Source of truth. Consumed by all folio-org repos via `uses:`.
# When this file is updated, all consuming repos automatically get
# the latest version (no per-repo changes needed).
#
# Usage in a repo's `.github/workflows/ai-code-review.yml`:
#   name: AI Code Review
#   on:
#     pull_request:
#       types: [opened, synchronize]
#     pull_request_review_comment:
#       types: [created]
#     workflow_dispatch:
#       inputs:
#         pr_number:
#           description: "PR number"
#           required: true
#           type: number
#   jobs:
#     review:
#       uses: folio-org/folio-ai-agents/.github/workflows/ai-code-review.yml@main
#       secrets: inherit
# =====================================================================

name: AI Code Review (reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: false
        type: number
      review_type:
        description: "Type of review: 'full' or 'comment'"
        required: false
        default: "full"
        type: string
      comment_id:
        description: "Review comment ID (for comment-type reviews)"
        required: false
        type: number
      owner:
        description: "Repository owner (defaults to triggering repo)"
        required: false
        type: string
      repo:
        description: "Repository name (defaults to triggering repo)"
        required: false
        type: string
      api_url:
        description: "AI reviewer service URL"
        required: false
        default: "https://pr-reviewer.ci.folio.org"
        type: string
    secrets:
      ai_pr_reviewer:
        description: "API key for the AI reviewer service (org-level secret)"
        required: true
      gh_token:
        description: "GitHub token for API access (pass github.token from caller)"
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number and repo info
        id: pr
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_OWNER: ${{ inputs.owner }}
          INPUT_REPO: ${{ inputs.repo }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_CONTEXT_PR: ${{ github.event.pull_request.number }}
          GITHUB_CONTEXT_ISSUE: ${{ github.event.issue.number }}
          GITHUB_CONTEXT_OWNER: ${{ github.event.repository.owner.login }}
          GITHUB_CONTEXT_REPO: ${{ github.event.repository.name }}
        run: |
          echo "::group::Context Variables"
          echo "Event Name: $GITHUB_EVENT_NAME"
          echo "Context PR Number: $GITHUB_CONTEXT_PR"
          echo "Context Issue Number: $GITHUB_CONTEXT_ISSUE"
          echo "Input PR Number: $INPUT_PR_NUMBER"
          echo "Context Owner: $GITHUB_CONTEXT_OWNER"
          echo "Context Repo: $GITHUB_CONTEXT_REPO"
          echo "::endgroup::"
          
          # Use context variables first (more reliable in reusable workflows)
          PR_NUMBER="$INPUT_PR_NUMBER"
          if [ -z "$PR_NUMBER" ]; then
            # Try context variables
            if [ -n "$GITHUB_CONTEXT_PR" ] && [ "$GITHUB_CONTEXT_PR" != "null" ]; then
              PR_NUMBER="$GITHUB_CONTEXT_PR"
            elif [ -n "$GITHUB_CONTEXT_ISSUE" ] && [ "$GITHUB_CONTEXT_ISSUE" != "null" ]; then
              PR_NUMBER="$GITHUB_CONTEXT_ISSUE"
            fi
          fi
          
          # Fallback to event file if context variables didn't work
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            PR_NUMBER=$(jq -r '
              (.issue.number // .pull_request.number // empty)
            ' "$GITHUB_EVENT_PATH")
          fi
          
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "::error::Could not resolve PR number. Event: $GITHUB_EVENT_NAME"
            exit 1
          fi
          
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Reviewing PR #$PR_NUMBER"
          
          # Resolve owner and repo (use inputs if provided, otherwise from context)
          OWNER="$INPUT_OWNER"
          if [ -z "$OWNER" ]; then
            OWNER="$GITHUB_CONTEXT_OWNER"
          fi
          REPO="$INPUT_REPO"
          if [ -z "$REPO" ]; then
            REPO="$GITHUB_CONTEXT_REPO"
          fi
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"

      - name: Determine review type and comment ID
        id: params
        env:
          INPUT_COMMENT_ID: ${{ inputs.comment_id }}
          INPUT_REVIEW_TYPE: ${{ inputs.review_type }}
        run: |
          COMMENT_ID="$INPUT_COMMENT_ID"
          if [ -z "$COMMENT_ID" ]; then
            COMMENT_ID=$(jq -r '(.comment.id // .review_comment.id // empty)' "$GITHUB_EVENT_PATH")
          fi
          if [ -n "$COMMENT_ID" ] && [ "$COMMENT_ID" != "0" ] && [ "$COMMENT_ID" != "null" ]; then
            echo "type=comment" >> "$GITHUB_OUTPUT"
            echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"
          else
            echo "type=${INPUT_REVIEW_TYPE:-full}" >> "$GITHUB_OUTPUT"
            echo "comment_id=" >> "$GITHUB_OUTPUT"
          fi

      - name: Request full PR review
        if: steps.params.outputs.type == 'full'
        env:
          API_URL: ${{ inputs.api_url }}
          API_KEY: ${{ secrets.ai_pr_reviewer }}
          GH_TOKEN: ${{ secrets.gh_token }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          OWNER="${{ steps.pr.outputs.owner }}"
          REPO="${{ steps.pr.outputs.repo }}"
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::PR number is empty — cannot send review request"
            exit 1
          fi
          echo "::group::Debug Info"
          echo "Owner: $OWNER"
          echo "Repo: $REPO"
          echo "PR Number: $PR_NUMBER"
          echo "Token length: ${#GH_TOKEN}"
          echo "::endgroup::"
          jq -n \
            --arg owner "$OWNER" \
            --arg repo "$REPO" \
            --argjson pr_number "$PR_NUMBER" \
            --arg token "$GH_TOKEN" \
            '{owner: $owner, repo: $repo, pr_number: $pr_number, github_token: $token}' \
            | curl -sf -X POST "$API_URL/review" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -H "X-API-Key: $API_KEY" \
              --data-binary @-

      - name: Request comment analysis
        if: steps.params.outputs.type == 'comment'
        env:
          API_URL: ${{ inputs.api_url }}
          API_KEY: ${{ secrets.ai_pr_reviewer }}
          GH_TOKEN: ${{ secrets.gh_token }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          OWNER="${{ steps.pr.outputs.owner }}"
          REPO="${{ steps.pr.outputs.repo }}"
          COMMENT_ID="${{ steps.params.outputs.comment_id }}"
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::PR number is empty — cannot send comment review request"
            exit 1
          fi
          if [ -z "$COMMENT_ID" ]; then
            echo "::error::Comment ID is empty — cannot send comment review request"
            exit 1
          fi
          jq -n \
            --arg owner "$OWNER" \
            --arg repo "$REPO" \
            --argjson pr_number "$PR_NUMBER" \
            --argjson comment_id "$COMMENT_ID" \
            --arg token "$GH_TOKEN" \
            '{owner: $owner, repo: $repo, pr_number: $pr_number, comment_id: $comment_id, github_token: $token}' \
            | curl -sf -X POST "$API_URL/review/comment" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -H "X-API-Key: $API_KEY" \
              --data-binary @-
